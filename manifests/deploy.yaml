---
# ──────────────────────────────────────────────────────────────────
# Release Readiness Dashboard — Kubernetes Deployment Manifest
# ──────────────────────────────────────────────────────────────────
#
# Prerequisites:
#
# 1. Create OAuth secret (for GitHub Deploy tab):
#
#    kubectl create secret generic release-readiness-oauth \
#      --from-literal=GITHUB_CLIENT_ID=Ov23liXXXXXXX \
#      --from-literal=GITHUB_CLIENT_SECRET=your_secret_here \
#      --from-literal=FLASK_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))") \
#      -n YOUR_NAMESPACE
#
# 2. (Optional) Create PAT secret (if using PAT instead of OAuth):
#
#    kubectl create secret generic release-readiness-github \
#      --from-literal=GITHUB_TOKEN=ghp_YOUR_TOKEN_HERE \
#      -n YOUR_NAMESPACE
#
# 3. (Optional) Create Gemini API key secret (if not using Vertex AI):
#
#    kubectl create secret generic release-readiness-gemini \
#      --from-literal=GEMINI_API_KEY=your_api_key_here \
#      -n YOUR_NAMESPACE
#
# 4. (Optional) Create Jira MCP secret (for Jira-enriched release notes):
#
#    kubectl create secret generic release-readiness-jira \
#      --from-literal=mcp-url=https://jira-mcp.example.com \
#      --from-literal=jira-email=your-email@company.com \
#      --from-literal=pat-token=your_jira_pat_token \
#      -n YOUR_NAMESPACE
#
# 5. (Optional) Create PVC for board data persistence:
#
#    kubectl apply -f pvc.yaml -n YOUR_NAMESPACE
#
# 6. Apply:
#
#    kubectl apply -f deploy.yaml -n YOUR_NAMESPACE
#
# ──────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-readiness
  labels:
    app: release-readiness
spec:
  replicas: 1
  # ⚠️ MUST use Recreate (not RollingUpdate) because the PVC is
  # ReadWriteOnce — it can only be mounted by ONE pod at a time.
  # RollingUpdate would start a new pod BEFORE killing the old one,
  # causing the new pod to hang on "waiting for PVC to be released".
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: release-readiness
  template:
    metadata:
      labels:
        app: release-readiness
      annotations:
        # ═══ Istio Sidecar — Access Logging ═══════════════════════
        # Enable access logs in istio-proxy to see all HTTP traffic
        # View with: kubectl logs <pod> -c istio-proxy
        proxy.istio.io/config: |
          proxyStatsMatcher:
            inclusionPrefixes:
            - "cluster.outbound"
            - "http"
        sidecar.istio.io/logLevel: "info"
        # Enable Envoy access logging (shows every request)
        sidecar.istio.io/componentLogLevel: "filter:debug,router:debug,http:debug"
    spec:
      # Ensure the old pod fully terminates before the new one starts
      terminationGracePeriodSeconds: 30
      serviceAccountName: release-readiness    # ← needs RBAC for ConfigMaps + read Deployments
      automountServiceAccountToken: true         # ← Required: mounts SA token so K8s API calls authenticate
      containers:
      - name: release-readiness
        image: YOUR_REGISTRY/release-readiness:latest   # ← Replace with your image
        ports:
        - containerPort: 8080
          protocol: TCP

        env:
        # ════════════════════════════════════════════════════════════
        # GitHub — Authentication (choose Option A or B)
        # ════════════════════════════════════════════════════════════

        # ── Option A: OAuth (recommended) ──────────────────────────
        # Users log in with GitHub accounts. Per-user tokens for
        # audit trails and workflow dispatch.
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: release-readiness-oauth
              key: GITHUB_CLIENT_ID
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: release-readiness-oauth
              key: GITHUB_CLIENT_SECRET
              optional: true
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: release-readiness-oauth
              key: FLASK_SECRET_KEY
              optional: true

        # ── Option B: Shared PAT (legacy) ──────────────────────────
        # All API calls use a single Personal Access Token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-github
              key: GITHUB_TOKEN
              optional: true

        # ════════════════════════════════════════════════════════════
        # GitHub — Config
        # ════════════════════════════════════════════════════════════
        - name: GITHUB_URL
          value: "https://github.com"                       # ← Replace with GHE URL if using GitHub Enterprise
        - name: BASE_URL
          value: "https://release-readiness.example.com"    # ← Replace with your external URL (for OAuth callback)

        # ════════════════════════════════════════════════════════════
        # Deploy Tab — GitHub Actions Integration
        # ════════════════════════════════════════════════════════════
        - name: DEPLOY_REPO
          value: "your-org/app-deployments"                 # ← Replace with your deployment workflows repo
        - name: DEPLOY_WORKFLOW
          value: "deploy.yml"                               # ← Default workflow file (optional, Deploy tab auto-discovers all)

        # ════════════════════════════════════════════════════════════
        # QA Tab — GitOps Deployment Pipeline
        # ════════════════════════════════════════════════════════════
        - name: QA_DEPLOY_REPO
          value: "your-org/app-deployments"                 # ← Repo where version.yaml is pushed (defaults to DEPLOY_REPO if not set)
        - name: QA_NAMESPACE
          value: "uat-testing"                              # ← Kubernetes namespace for QA environment
        - name: QA_TEST_REPO
          value: ""                                         # ← Repo with QA test pipelines (optional, leave empty if not ready)
        - name: QA_TEST_SMOKE_WORKFLOW
          value: "smoke-tests.yml"                          # ← Workflow file for smoke tests
        - name: QA_TEST_E2E_WORKFLOW
          value: "e2e-tests.yml"                            # ← Workflow file for E2E tests
        - name: QA_TEST_REGRESSION_WORKFLOW
          value: "regression-tests.yml"                     # ← Workflow file for regression tests

        # ════════════════════════════════════════════════════════════
        # Kubernetes — Namespace & Board Storage
        # ════════════════════════════════════════════════════════════
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace                 # Auto-detect namespace from pod

        # ════════════════════════════════════════════════════════════
        # AI / Gemini — Choose one authentication method
        # ════════════════════════════════════════════════════════════

        # Method 1: Vertex AI (recommended for GDC/GCP)
        # Uses Workload Identity or GOOGLE_APPLICATION_CREDENTIALS
        - name: GCP_PROJECT_ID
          value: ""                                         # ← Your GCP project ID
        - name: GCP_REGION
          value: "us-central1"                              # ← Vertex AI region

        # Method 2: Gemini API Key (simpler, for non-GCP environments)
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: release-readiness-gemini
              key: GEMINI_API_KEY
              optional: true

        # AI model selection
        - name: GEMINI_MODEL
          value: "gemini-2.0-flash"                         # ← Model to use for AI Readiness & Release Notes

        # ════════════════════════════════════════════════════════════
        # Custom Components (optional)
        # ════════════════════════════════════════════════════════════
        # Format: name1:Type1:Description:artifactory/path,name2:Type2:Description:artifactory/path
        # The 4th field (artifactory_path) is optional — if omitted, version is entered manually.
        - name: CUSTOM_COMPONENTS
          value: "ingestion-pipeline:Spark:Main data ingestion from source systems:spark-releases/ingestion-pipeline,etl-transformer:PySpark:Data transformation and enrichment:pyspark-releases/etl-transformer,data-validator:PySpark:Data quality validation rules:pyspark-releases/data-validator,report-aggregator:Spark:Aggregation jobs for reporting:spark-releases/report-aggregator,mobile-app:Mobile:iOS/Android mobile application"

        # ════════════════════════════════════════════════════════════
        # Storage Backend
        # ════════════════════════════════════════════════════════════
        # 'auto' = detect ConfigMap permissions at startup
        # 'configmap' = force ConfigMap + file backup
        # 'file' = force file-only (no ConfigMap writes)
        - name: STORAGE_BACKEND
          value: "auto"
        - name: BOARD_DATA_DIR
          value: "/data/boards"

        # ════════════════════════════════════════════════════════════
        # Jira MCP Server (optional — enables Jira-enriched release notes)
        # ════════════════════════════════════════════════════════════
        - name: JIRA_MCP_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-jira
              key: mcp-url
              optional: true
        - name: JIRA_EMAIL
          valueFrom:
            secretKeyRef:
              name: release-readiness-jira
              key: jira-email
              optional: true
        - name: JIRA_PAT_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-jira
              key: pat-token
              optional: true
        - name: JIRA_BASE_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-jira
              key: jira-base-url
              optional: true

        # ════════════════════════════════════════════════════════════
        # Confluence MCP Server (optional — enables Confluence Agent tab)
        # ════════════════════════════════════════════════════════════
        # Create the secret:
        #   kubectl create secret generic release-readiness-confluence \
        #     --from-literal=mcp-url=https://confluence-mcp.example.com/mcp \
        #     --from-literal=base-url=https://confluence.example.com \
        #     --from-literal=email=your-email@company.com \
        #     --from-literal=pat-token=your_confluence_pat_token \
        #     --from-literal=default-spaces=SPACE1,SPACE2 \
        #     -n YOUR_NAMESPACE
        #
        # Option A: MCP mode (if you have a Confluence MCP server deployed)
        - name: CONFLUENCE_MCP_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-confluence
              key: mcp-url
              optional: true
        # Option B: Direct REST API mode (no MCP server needed)
        - name: CONFLUENCE_BASE_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-confluence
              key: base-url
              optional: true
        - name: CONFLUENCE_EMAIL
          valueFrom:
            secretKeyRef:
              name: release-readiness-confluence
              key: email
              optional: true
        - name: CONFLUENCE_PAT_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-confluence
              key: pat-token
              optional: true
        - name: CONFLUENCE_DEFAULT_SPACES
          valueFrom:
            secretKeyRef:
              name: release-readiness-confluence
              key: default-spaces
              optional: true
        # ════════════════════════════════════════════════════════════
        # Production Cluster — Remote OpenShift/K8s (Prod Env tab)
        # ════════════════════════════════════════════════════════════
        # Create secret:
        #   kubectl create secret generic release-readiness-prod \
        #     --from-literal=api-url=https://api.openshift-prod.example.com:6443 \
        #     --from-literal=token=eyJhbGciOiJSUzI1NiIs... \
        #     --from-literal=namespace=prod-namespace \
        #     -n YOUR_NAMESPACE
        - name: PROD_CLUSTER_API
          valueFrom:
            secretKeyRef:
              name: release-readiness-prod
              key: api-url
              optional: true
        - name: PROD_CLUSTER_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-prod
              key: token
              optional: true
        - name: PROD_NAMESPACE
          valueFrom:
            secretKeyRef:
              name: release-readiness-prod
              key: namespace
              optional: true
        - name: PROD_CLUSTER_VERIFY_SSL
          value: "false"                                      # ← Set to 'true' in production with proper CA certs

        # ═══ Proxy — Corporate Proxy for Outbound HTTPS ═══════════
        # Required in UAT/Prod if the cluster routes outbound traffic
        # through a proxy that requires Kerberos (407) authentication.
        # Without this, GitHub/Confluence/Jira API calls will fail with:
        #   "407 Authentication Required" / "tunnel connection failed"
        #
        # Create secret:
        #   kubectl create secret generic release-readiness-proxy \
        #     --from-literal=proxy-url=http://proxy.your-org.com:8080 \
        #     -n YOUR_NAMESPACE
        - name: PROXY_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-proxy
              key: proxy-url
              optional: true                                   # ← Not needed in Dev (direct internet)
        - name: SSL_VERIFY
          value: "false"                                       # ← Set to 'true' once proxy CA certs are trusted

        # ═══ Kerberos — Keytab for Proxy Authentication ═══════════
        # If your proxy requires Kerberos auth (407 errors), mount a
        # keytab file so the pod can obtain Kerberos tickets.
        # Create secret from keytab:
        #   kubectl create secret generic krb5-keytab \
        #     --from-file=krb5.keytab=/path/to/service.keytab \
        #     -n YOUR_NAMESPACE
        # Then uncomment the volumeMount and volume below.
        - name: KRB5_KTNAME
          value: "/etc/krb5/krb5.keytab"                       # ← Path where keytab will be mounted
        #- name: KRB5_CONFIG
        #  value: "/etc/krb5/krb5.conf"                        # ← Optional: custom krb5.conf path

        # ═══ Deployment Environment ═══════════════════════════════
        # Controls which cluster is "local" and which is "remote":
        #   DEPLOY_ENV=uat  → UAT tab reads local, Prod tab connects remotely
        #   DEPLOY_ENV=prod → Prod tab reads local, UAT tab connects remotely
        - name: DEPLOY_ENV
          value: "uat"                                        # ← Change to "prod" when deploying to production cluster

        # ═══ UAT Cluster (Remote) ═════════════════════════════════
        # Only needed when DEPLOY_ENV=prod (app deployed in production).
        # Create the secret:
        #   kubectl create secret generic release-readiness-uat \
        #     --from-literal=api-url=https://api.openshift-uat.example.com:6443 \
        #     --from-literal=token=eyJhbGciOiJSUzI1NiIs... \
        #     --from-literal=namespace=uat-namespace \
        #     -n YOUR_NAMESPACE
        - name: UAT_CLUSTER_API
          valueFrom:
            secretKeyRef:
              name: release-readiness-uat
              key: api-url
              optional: true
        - name: UAT_CLUSTER_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-uat
              key: token
              optional: true
        - name: UAT_NAMESPACE
          valueFrom:
            secretKeyRef:
              name: release-readiness-uat
              key: namespace
              optional: true
        - name: UAT_CLUSTER_VERIFY_SSL
          value: "false"                                      # ← Set to 'true' with proper CA certs

        # ═══ Artifactory (Custom Component Version Detection) ═════
        # Auto-detect latest versions for non-K8s components.
        # Create the secret:
        #   kubectl create secret generic release-readiness-artifactory \
        #     --from-literal=url=https://artifactory.your-org.com \
        #     --from-literal=user=your-username \
        #     --from-literal=token=your-api-token \
        #     -n YOUR_NAMESPACE
        - name: ARTIFACTORY_URL
          valueFrom:
            secretKeyRef:
              name: release-readiness-artifactory
              key: url
              optional: true
        - name: ARTIFACTORY_USER
          valueFrom:
            secretKeyRef:
              name: release-readiness-artifactory
              key: user
              optional: true
        - name: ARTIFACTORY_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-readiness-artifactory
              key: token
              optional: true

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /api/ping
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/ping
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        volumeMounts:
        - name: board-data
          mountPath: /data/boards
        # Uncomment for Kerberos proxy auth (407 errors):
        #- name: krb5-keytab
        #  mountPath: /etc/krb5
        #  readOnly: true

      volumes:
      - name: board-data
        persistentVolumeClaim:
          claimName: release-board-data
      # Uncomment for Kerberos proxy auth (407 errors):
      #- name: krb5-keytab
      #  secret:
      #    secretName: krb5-keytab

---
apiVersion: v1
kind: Service
metadata:
  name: release-readiness
  labels:
    app: release-readiness
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: release-readiness

---
# ──────────────────────────────────────────────────────────────────
# RBAC — ServiceAccount + Role for K8s API access
# ──────────────────────────────────────────────────────────────────
# The app needs:
#   - Read Deployments/StatefulSets/Pods/Events (for Board, UAT Env, AI Readiness)
#   - Read/Write ConfigMaps (for board state persistence — optional with file fallback)
# ──────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-readiness
  labels:
    app: release-readiness

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-readiness
  labels:
    app: release-readiness
rules:
# Read workloads — needed for service discovery, UAT Env tab, AI Readiness
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch"]

# Read pods & events — needed for AI Readiness health checks
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services"]
  verbs: ["get", "list", "watch"]

# Read/Write ConfigMaps — board state persistence
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "patch"]

# Read Helm releases (stored as secrets with label owner=helm)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-readiness
  labels:
    app: release-readiness
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: release-readiness
subjects:
- kind: ServiceAccount
  name: release-readiness
