apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ template "application.name" . }}-auth-ext-authz
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ $.Release.Name }}
    chart: {{ $.Chart.Name }}
    release: "{{ $.Release.Name }}"
spec:
  # This selector targets the application pods in this namespace.
  selector:
    # Select all services that require OIDC authentication
    matchLabels:
      auth-type: oidc
  rules:
    - to:
        - operation:
            hosts:
              # Allow requests via the external gateway (external traffic)
              - {{ include "aarui.virtualservice_host" . }}
              # Allow internal service-to-service calls (all mesh services)
              {{- range .Values.virtualService.routes }}
              - {{ .destination.host }}.{{ $.Values.namespace }}.svc.cluster.local
              {{- end }}